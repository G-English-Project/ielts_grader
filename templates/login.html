<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Grader — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a202c;
    }

    .logo p {
      font-size: 0.85rem;
      color: #718096;
      margin-top: 0.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 7px;
      font-size: 0.95rem;
      color: #1a202c;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }

    input:focus {
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66,153,225,0.15);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.7rem;
      background: #3182ce;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #2b6cb0; }

    .error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #c53030;
      border-radius: 7px;
      padding: 0.6rem 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Canvas Grader</h1>
      <p>Sign in to continue</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
